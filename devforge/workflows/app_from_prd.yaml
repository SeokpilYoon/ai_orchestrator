workflow: app_from_prd
# Complete app_from_prd pipeline (DEVF-060..071):
# foundation -> architecture -> scaffold -> vertical slice planner +
# implementer -> backlog generator + implementer -> acceptance coverage
# -> release packaging.
stages:
  - id: prd_intake
    role: product_manager
    mode: read_only
    output: product_summary.md

  - id: requirements_inventory
    role: technical_planner
    mode: read_only
    output: requirements.json

  - id: mvp_scope_freeze
    role: product_manager
    mode: read_only
    output: mvp_scope.md

  - id: ux_flow_inventory
    role: product_manager
    mode: read_only
    output: screen_inventory.json

  - id: architecture_design
    role: system_architect
    mode: read_only
    output: architecture.md

  - id: scaffold_generation
    role: implementer
    mode: read_only
    output: scaffold_manifest.json

  - id: vertical_slice_planner
    role: product_manager
    mode: read_only
    output: vertical_slice_plan.json

  - id: vertical_slice_implementer
    role: implementer
    mode: single
    output: vertical_slice_result.json

  - id: backlog_generation
    role: technical_planner
    mode: read_only
    output: backlog.json

  - id: backlog_implementation
    role: implementer
    mode: single
    output: backlog_progress.json

  - id: acceptance_coverage_calculation
    role: technical_planner
    mode: read_only
    output: acceptance_coverage.json

  - id: release_packaging
    role: release_manager
    mode: read_only
    output: release/
