workflow: feature
# This workflow definition lists the high-level stages that ``WorkflowEngine``
# records in ``state/steps.json``. The implementer stage is a *composite* —
# it encompasses implement + validate + review + judge per candidate, plus
# the revision loop (DEVF-045) and fallback chain (DEVF-052).
stages:
  - id: normalize_task
    role: technical_planner
    mode: read_only
    output: normalized_task.json

  - id: inspect_repo
    role: technical_planner
    mode: read_only
    output: repo_context.md

  - id: plan
    role: system_architect
    mode: read_only
    output: implementation_plan.json

  - id: implement_candidates
    role: implementer
    mode: tournament
    composite: true
    output: candidate_summaries

  - id: comparison_report
    type: local_writer
    output: comparison.md

  - id: final_report
    type: local_writer
    output: final_report.md
